<body>

<!-- SHARED HEADER (loaded from header.html by shared-layout.js) -->
<div id="site-header"></div>

<main>
<!-- HERO -->
<div class="hero">
  <div class="hero-badge"><i class="ti ti-packages"></i> Complete Product Catalog</div>
  <h1>All EV <span>Spare Parts</span></h1>
  <p>138+ genuine parts · COD available · All India delivery · GST billing</p>
  <div class="hero-stats">
    <div class="hero-stat"><div class="hero-stat-num">138+</div><div class="hero-stat-label">Products</div></div>
    <div class="hero-stat"><div class="hero-stat-num">COD</div><div class="hero-stat-label">Available</div></div>
    <div class="hero-stat"><div class="hero-stat-num">All India</div><div class="hero-stat-label">Delivery</div></div>
    <div class="hero-stat"><div class="hero-stat-num">GST</div><div class="hero-stat-label">Registered</div></div>
  </div>
</div>

<!-- CONTROLS -->
<div class="controls">
  <div class="search-wrap">
    <i class="ti ti-search search-icon"></i>
    <input type="text" class="search-input" id="catalogSearchInput" placeholder="Search parts... throttle, bearing, motor, disc, charger..." oninput="filterProducts()"/>
    <i class="ti ti-x search-clear" id="catalogSearchClear" onclick="clearSearch()"></i>
  </div>
  <div class="filter-scroll" id="filterBtns">
    <button class="filter-btn active" onclick="setFilter('all',this)"><i class="ti ti-layout-grid"></i> All</button>
    <button class="filter-btn" onclick="setFilter('throttle',this)"><i class="ti ti-adjustments"></i> Throttle</button>
    <button class="filter-btn" onclick="setFilter('dc-converter',this)"><i class="ti ti-cpu"></i> DC Converter</button>
    <button class="filter-btn" onclick="setFilter('mcb',this)"><i class="ti ti-switch"></i> MCB</button>
    <button class="filter-btn" onclick="setFilter('connector',this)"><i class="ti ti-plug"></i> Connector</button>
    <button class="filter-btn" onclick="setFilter('bearing',this)"><i class="ti ti-circle"></i> Bearing</button>
    <button class="filter-btn" onclick="setFilter('brakes',this)"><i class="ti ti-brake"></i> Brakes</button>
    <button class="filter-btn" onclick="setFilter('disc',this)"><i class="ti ti-circle-dot"></i> Disc</button>
    <button class="filter-btn" onclick="setFilter('locks',this)"><i class="ti ti-lock"></i> Locks</button>
    <button class="filter-btn" onclick="setFilter('switches',this)"><i class="ti ti-toggle-right"></i> Switches</button>
    <button class="filter-btn" onclick="setFilter('led',this)"><i class="ti ti-bulb"></i> LED</button>
    <button class="filter-btn" onclick="setFilter('body',this)"><i class="ti ti-car"></i> Body</button>
    <button class="filter-btn" onclick="setFilter('electrical',this)"><i class="ti ti-bolt"></i> Electrical</button>
    <button class="filter-btn" onclick="setFilter('controller',this)"><i class="ti ti-settings"></i> Controller</button>
    <button class="filter-btn" onclick="setFilter('motor',this)"><i class="ti ti-engine"></i> Motor</button>
    <button class="filter-btn" onclick="setFilter('charger',this)"><i class="ti ti-battery-charging"></i> Charger</button>
    <button class="filter-btn" onclick="setFilter('wiring',this)"><i class="ti ti-wave-sine"></i> Wiring</button>
    <button class="filter-btn" onclick="setFilter('mirrors',this)"><i class="ti ti-mirror"></i> Mirrors</button>
    <button class="filter-btn" onclick="setFilter('lights',this)"><i class="ti ti-bulb"></i> Lights</button>
    <button class="filter-btn" onclick="setFilter('sensor',this)"><i class="ti ti-radar"></i> Sensor</button>
  </div>
</div>
<div class="results-count"><span id="resultCount">138</span> products found</div>

<!-- PRODUCTS -->
<div class="products-wrap">
  <div class="products-grid" id="productsGrid">
    <!-- Product cards are rendered dynamically by products-render.js from products.json -->
  </div>
  <div class="no-results" id="noResults">
    <i class="ti ti-search-off"></i>
    <p>No products found</p>
    <small>Try a different search or category</small>
  </div>
</div>
</main>

<!-- SHARED FOOTER (loaded from footer.html by shared-layout.js) -->
<div id="site-footer"></div>

<!-- CART SIDEBAR -->
<div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>
<div class="cart-sidebar" id="cartSidebar">
  <div class="cart-header">
    <h3><i class="ti ti-shopping-cart"></i> Your Cart</h3>
    <button class="cart-close" onclick="closeCart()" aria-label="Close cart"><i class="ti ti-x"></i></button>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-footer" id="cartFooter" style="display:none;">
    <div class="cart-summary-extra" id="cartSummaryExtra" style="display:none;">
      <div class="cart-mrp-row"><span>Total MRP</span><strong id="cartMrpTotal">₹0</strong></div>
      <div class="cart-savings-row"><span>You Save</span><strong id="cartSavingsTotal">₹0</strong></div>
    </div>
    <div class="cart-total-row"><span>Total</span><strong id="cartTotal">₹0</strong></div>
    <button class="btn-cart-checkout" onclick="checkoutViaWhatsApp()"><i class="ti ti-brand-whatsapp"></i> Checkout via WhatsApp</button>
  </div>
</div>

<script src="assets/js/products-data.js"></script>
<script src="assets/js/cart.js"></script>
<script src="assets/js/search-widget.js"></script>
<script src="assets/js/shared-layout.js"></script>
<script>
var ALL_PRODUCTS = [];
var currentFilter = 'all';

function priceHtml(p) {
  return window.EcoConnex.renderPriceHtml(p, { hideSavingsLine: true });
}

function cardHtml(p) {
  var hasPrice = typeof p.price === 'number' && p.price > 0;
  var outOfStock = window.EcoConnex.isOutOfStock(p);
  var itemJson = window.EcoConnex.escapeHtml(JSON.stringify({ name: p.name, sku: p.sku, price: hasPrice ? p.price : null, mrp: hasPrice ? p.mrp : null, currency: p.currency || 'INR', icon: p.icon }));
  var qtyId = 'tqty-cat-' + p.id;
  var qtyStepper =
    '<div class="tile-qty" onclick="event.stopPropagation()">' +
      '<button type="button" aria-label="Decrease quantity" onclick="var el=document.getElementById(\'' + qtyId + '\');el.textContent=Math.max(1,parseInt(el.textContent,10)-1);">−</button>' +
      '<span class="tile-qty-num" id="' + qtyId + '">1</span>' +
      '<button type="button" aria-label="Increase quantity" onclick="var el=document.getElementById(\'' + qtyId + '\');el.textContent=parseInt(el.textContent,10)+1;">+</button>' +
    '</div>';
  var actionBtn = outOfStock
    ? '<button class="btn-enquire" disabled style="opacity:0.5;cursor:not-allowed;"><i class="ti ti-ban"></i> Out of Stock</button>'
    : '<button class="btn-enquire" onclick="var q=parseInt(document.getElementById(\'' + qtyId + '\').textContent,10)||1;EcoConnex.cart.addToCartUI(this, JSON.parse(this.getAttribute(\'data-item\')), q);document.getElementById(\'' + qtyId + '\').textContent=\'1\';" data-item="' + itemJson + '"><i class="ti ti-shopping-cart-plus"></i> Add</button>';
  return (
    '<div class="product-card" id="product-' + p.id + '" data-cat="' + p.category + '" data-name="' + window.EcoConnex.escapeHtml(p.name.toLowerCase()) + '" data-sku="' + p.sku + '" onclick="if(!event.target.closest(\'button\')&&!event.target.closest(\'a\')){window.location.href=\'product.html?id=' + p.id + '\';}" style="cursor:pointer;">' +
      '<div class="product-img">' + window.EcoConnex.renderProductImageHtml(p, { width: 220, height: 140 }) +
        '<span class="stock-badge ' + window.EcoConnex.getStockClass(p.stock) + '">' + window.EcoConnex.escapeHtml(p.stock) + '</span>' +
        '<span class="cat-badge">' + window.EcoConnex.escapeHtml(p.categoryLabel || p.category) + '</span>' +
      '</div>' +
      '<div class="product-body">' +
        '<div class="product-name">' + window.EcoConnex.escapeHtml(p.name) + '</div>' +
        priceHtml(p) +
        (outOfStock ? '' : qtyStepper) +
        '<div class="product-actions">' +
          actionBtn +
          '<a href="tel:+918778657912" class="btn-call"><i class="ti ti-phone"></i></a>' +
        '</div>' +
      '</div>' +
    '</div>'
  );
}

function renderProducts(products) {
  document.getElementById('productsGrid').innerHTML = products.map(cardHtml).join('');
}

function setFilter(cat, btn) {
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  filterProducts();
}

function filterProducts() {
  var search = document.getElementById('catalogSearchInput').value.toLowerCase().trim();
  var clear = document.getElementById('catalogSearchClear');
  clear.style.display = search ? 'block' : 'none';

  var filtered = window.EcoConnex.getByCategory(ALL_PRODUCTS, currentFilter);
  if (search) {
    filtered = filtered.filter(function(p){
      return p.name.toLowerCase().indexOf(search) !== -1 ||
             p.sku.toLowerCase().indexOf(search) !== -1 ||
             (p.keywords || []).some(function(k){ return k.indexOf(search) !== -1; });
    });
  }
  renderProducts(filtered);
  document.getElementById('resultCount').textContent = filtered.length;
  document.getElementById('noResults').style.display = filtered.length === 0 ? 'block' : 'none';
}

function clearSearch() {
  document.getElementById('catalogSearchInput').value = '';
  filterProducts();
}

function wa(product, price) {
  var msg = 'Hi Eco Connex! I am interested in: *' + product + '* (' + price + '). Please share details and availability.';
  window.open('https://wa.me/918778657912?text=' + encodeURIComponent(msg), '_blank');
}

function highlightFromSearch() {
  var params = new URLSearchParams(window.location.search);
  var id = params.get('highlight');
  if (!id) return;
  var el = document.getElementById('product-' + id);
  if (!el) return;
  setTimeout(function () {
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    el.classList.add('product-card-highlight');
    setTimeout(function () { el.classList.remove('product-card-highlight'); }, 2400);
  }, 300);
}

// ── CART UI ──
function updateCartUI() {
  var cart = window.EcoConnex.cart.getCart();
  var total = window.EcoConnex.cart.getTotal();
  var count = window.EcoConnex.cart.getCount();
  var totalSavings = window.EcoConnex.cart.getTotalSavings();
  var badge = document.getElementById('cartBadge');
  badge.textContent = count;
  badge.style.display = count > 0 ? 'flex' : 'none';
  var container = document.getElementById('cartItems');
  var footer = document.getElementById('cartFooter');
  document.getElementById('cartTotal').textContent = '₹' + total.toLocaleString('en-IN');
  var summaryExtra = document.getElementById('cartSummaryExtra');
  if (totalSavings > 0) {
    document.getElementById('cartMrpTotal').textContent = '₹' + window.EcoConnex.cart.getTotalMRP().toLocaleString('en-IN');
    document.getElementById('cartSavingsTotal').textContent = '₹' + totalSavings.toLocaleString('en-IN');
    summaryExtra.style.display = 'block';
  } else {
    summaryExtra.style.display = 'none';
  }
  if (cart.length === 0) {
    container.innerHTML = '<div class="cart-empty"><i class="ti ti-shopping-cart-off"></i><p>Your cart is empty</p></div>';
    footer.style.display = 'none';
    return;
  }
  footer.style.display = 'block';
  var priceNote = window.EcoConnex.cart.hasCallForPrice()
    ? '<div class="cart-price-note"><i class="ti ti-info-circle"></i> Price will be confirmed by Eco Connex</div>'
    : '';
  container.innerHTML = priceNote + cart.map(function (item) {
    var priceLine;
    if (item.price === null) {
      priceLine = 'Price on Request × ' + item.qty;
    } else {
      var unitLine = '₹' + item.price.toLocaleString('en-IN');
      if (item.mrp && item.mrp > item.price) {
        var pct = Math.round((item.mrp - item.price) / item.mrp * 100);
        unitLine += ' <span class="price-mrp">₹' + item.mrp.toLocaleString('en-IN') + '</span> <span class="price-off-badge">' + pct + '% OFF</span>';
      }
      priceLine = unitLine + ' × ' + item.qty + ' = ₹' + (item.price * item.qty).toLocaleString('en-IN');
    }
    return '<div class="cart-item"><div class="cart-item-icon">' + item.icon + '</div><div class="cart-item-info"><div class="cart-item-name">' + item.name + '</div><div class="cart-item-price">' + priceLine + '</div><div class="cart-item-qty"><button class="qty-btn" onclick="EcoConnex.cart.updateQty(\'' + item.sku + '\',-1)">−</button><span class="qty-num">' + item.qty + '</span><button class="qty-btn" onclick="EcoConnex.cart.updateQty(\'' + item.sku + '\',1)">+</button></div></div><button class="cart-item-remove" onclick="EcoConnex.cart.removeItem(\'' + item.sku + '\')" title="Remove"><i class="ti ti-trash"></i></button></div>';
  }).join('');
}
window.EcoConnex.cart.onChange(updateCartUI);

function openCart() { document.getElementById('cartOverlay').classList.add('open'); document.getElementById('cartSidebar').classList.add('open'); }
function closeCart() { document.getElementById('cartOverlay').classList.remove('open'); document.getElementById('cartSidebar').classList.remove('open'); }

function checkoutViaWhatsApp() {
  var cart = window.EcoConnex.cart.getCart();
  if (cart.length === 0) return;
  var total = window.EcoConnex.cart.getTotal();
  var totalMrp = window.EcoConnex.cart.getTotalMRP();
  var totalSavings = window.EcoConnex.cart.getTotalSavings();
  var itemLines = cart.map(function (item, i) {
    var priceLine;
    if (item.price === null) {
      priceLine = 'Price on Request';
    } else if (item.mrp && item.mrp > item.price) {
      var pct = Math.round((item.mrp - item.price) / item.mrp * 100);
      priceLine = 'MRP: ₹' + item.mrp.toLocaleString('en-IN') + ' (strikethrough)\n   Price: ₹' + (item.price * item.qty).toLocaleString('en-IN') + ' (' + pct + '% OFF)';
    } else {
      priceLine = 'Price: ₹' + (item.price * item.qty).toLocaleString('en-IN');
    }
    return (i + 1) + '. ' + item.name + '\n   SKU: ' + item.sku + '\n   Qty: ' + item.qty + '\n   ' + priceLine;
  }).join('\n\n');
  var msg = '🛒 *Order from Eco Connex*\n\n*Products:*\n' + itemLines +
    '\n\n' + (totalSavings > 0 ? 'Subtotal (MRP): ₹' + totalMrp.toLocaleString('en-IN') + '\nYou Save: ₹' + totalSavings.toLocaleString('en-IN') + '\n' : '') +
    '*Total: ₹' + total.toLocaleString('en-IN') + (window.EcoConnex.cart.hasCallForPrice() ? ' + items to confirm' : '') + '*\n\n' +
    'Please confirm my order and share delivery details. Thank you!';
  window.open('https://wa.me/918778657912?text=' + encodeURIComponent(msg), '_blank');
}

function applyCategoryFromUrl() {
  var params = new URLSearchParams(window.location.search);
  var cat = params.get('category');
  if (!cat) return;
  var btns = document.querySelectorAll('.filter-btn');
  for (var i = 0; i < btns.length; i++) {
    if (btns[i].getAttribute('onclick').indexOf("'" + cat + "'") !== -1) {
      setFilter(cat, btns[i]);
      return;
    }
  }
}

window.EcoConnex.loadProducts().then(function (products) {
  ALL_PRODUCTS = products;
  renderProducts(products);
  document.getElementById('resultCount').textContent = products.length;
  applyCategoryFromUrl();
  highlightFromSearch();
});
</script>
</body>
</html>
